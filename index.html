        // --- AUDIO FUNCTION ---
        const playAudio = (text) => {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Kechirasiz, brauzeringiz ovozli o'qishni qo'llab-quvvatlamaydi.");
            }
        };

        // --- DATA ---
        const vocabulary = [
            { hanzi: "该", pinyin: "gāi", uz: "kerak, lozim", ru: "должен, следует", en: "should" },
            { hanzi: "打算", pinyin: "dǎsuàn", uz: "rejalashtirmoq, niyat", ru: "планировать, намерение", en: "plan; intention" },
            { hanzi: "高铁", pinyin: "gāotiě", uz: "tezyurar poyezd", ru: "высокоскоростной поезд", en: "high-speed train" },
            { hanzi: "行", pinyin: "xíng", uz: "bo'ladi, yaxshi", ru: "ладно, пойдёт", en: "be all right; capable" },
            { hanzi: "路口", pinyin: "lùkǒu", uz: "chorraha", ru: "перекресток", en: "intersection; crossing" },
            { hanzi: "小心", pinyin: "xiǎoxīn", uz: "ehtiyot bo'lmoq", ru: "быть осторожным", en: "take care; careful" },
            { hanzi: "迟到", pinyin: "chídào", uz: "kechikmoq", ru: "опаздывать", en: "be late" },
            { hanzi: "红绿灯", pinyin: "hónglǜdēng", uz: "svetofor", ru: "светофор", en: "traffic lights" },
            { hanzi: "后来", pinyin: "hòulái", uz: "keyinchalik", ru: "потом, позже", en: "afterward; later" },
            { hanzi: "急", pinyin: "jí", uz: "shoshilinch, xavotir olmoq", ru: "срочный, беспокоиться", en: "urgent; be anxious" },
            { hanzi: "如果", pinyin: "rúguǒ", uz: "agar", ru: "если", en: "if" },
            { hanzi: "以前", pinyin: "yǐqián", uz: "oldin", ru: "раньше, до", en: "earlier times" },
            { hanzi: "耳机", pinyin: "ěrjī", uz: "quloqchin", ru: "наушники", en: "earphone; headphone" },
            { hanzi: "充电宝", pinyin: "chōngdiànbǎo", uz: "quvvat banki", ru: "внешний аккумулятор", en: "power bank" },
            { hanzi: "常用", pinyin: "chángyòng", uz: "ko'p ishlatiladigan", ru: "часто используемый", en: "commonly used" },
            { hanzi: "越", pinyin: "yuè", uz: "sari, shuncha", ru: "чем... тем...", en: "the more... the more..." },
            { hanzi: "分开", pinyin: "fēnkāi", uz: "ajralmoq, alohida", ru: "разделять", en: "separate" },
            { hanzi: "检查", pinyin: "jiǎnchá", uz: "tekshirmoq", ru: "проверять", en: "check (up); inspect" },
            { hanzi: "刷", pinyin: "shuā", uz: "skanerlash, surtish", ru: "сканировать", en: "scan" },
            { hanzi: "检票", pinyin: "jiǎnpiào", uz: "chiptani tekshirmoq", ru: "проверять билеты", en: "check/inspect tickets" },
            { hanzi: "电梯", pinyin: "diàntī", uz: "lift, eskalator", ru: "лифт, эскалатор", en: "elevator; escalator" },
            { hanzi: "放假", pinyin: "fàngjià", uz: "ta'tilga chiqmoq", ru: "быть в отпуске", en: "have a vacation" },
            { hanzi: "选择", pinyin: "xuǎnzé", uz: "tanlamoq", ru: "выбирать", en: "choose" },
            { hanzi: "沙发", pinyin: "shāfā", uz: "divan", ru: "диван", en: "sofa" },
            { hanzi: "必须", pinyin: "bìxū", uz: "shart, kerak", ru: "должен, необходимо", en: "have to; must" },
            { hanzi: "安静", pinyin: "ānjìng", uz: "tinch", ru: "тихий, спокойный", en: "quiet" }
        ];

        const dialogues = [
            {
                title: "Muloqot 1 / Диалог 1 / Dialogue 1",
                parts: [
                { speaker: "李文", hanzi: "家月，咱们该买去上海的票了。你打算怎么去上海？", pinyin: "Jiā yuè, zánmen gāi mǎi qù Shànghǎi de piào le. Nǐ dǎsuàn zěnme qù Shànghǎi?", uz: "Jiayue, Shanxayga chipta sotib olishimiz kerak. Shanxayga qanday borishni rejalashtiryapsan?", ru: "Цзяюэ, нам пора покупать билеты в Шанхай. Как ты планируешь поехать в Шанхай?", en: "Jiayue, we should buy tickets to Shanghai. How do you plan to go to Shanghai?" },
                { speaker: "白家月", hanzi: "我还没坐过高铁，咱们坐高铁去，怎么样？", pinyin: "Wǒ hái méi zuòguo gāotiě, zánmen zuò gāotiě qù, zěnmeyàng?", uz: "Men hali tezyurar poyezdda yurmaganman. Tezyurar poyezdda boramizmi, nima deysan?", ru: "Я еще не ездил на высокоскоростном поезде, как насчет того, чтобы поехать на нем?", en: "I haven't taken the high-speed train yet. How about we take the high-speed train?" },
                { speaker: "李文", hanzi: "没问题，从北京到上海的高铁很多，非常方便。", pinyin: "Méi wèntí, cóng Běijīng dào Shànghǎi de gāotiě hěn duō, fēicháng fāngbiàn.", uz: "Muammo yo'q, Pekindan Shanxaygacha tezyurar poyezdlar ko'p, juda qulay.", ru: "Без проблем, из Пекина в Шанхай много высокоскоростных поездов, очень удобно.", en: "No problem, there are many high-speed trains from Beijing to Shanghai, very convenient." },
                { speaker: "白家月", hanzi: "行！怎么买高铁票？", pinyin: "Xíng! Zěnme mǎi gāotiě piào?", uz: "Yaxshi! Tezyurar poyezd chiptasini qanday sotib olamiz?", ru: "Ладно! Как купить билет на высокоскоростной поезд?", en: "Alright! How to buy a high-speed train ticket?" },
                { speaker: "李文", hanzi: "用手机App就能买。给我你的护照，我帮你买。", pinyin: "Yòng shǒujī App jiù néng mǎi. Gěi wǒ nǐ de hùzhào, wǒ bāng nǐ mǎi.", uz: "Mobil ilova orqali sotib olish mumkin. Menga pasportingni ber, men senga sotib olaman.", ru: "Можно купить через мобильное приложение. Дай мне свой паспорт, я помогу тебе купить.", en: "You can buy it using a mobile app. Give me your passport, I'll help you buy it." },
                { speaker: "白家月", hanzi: "早就听说过高铁，终于可以坐上了。", pinyin: "Zǎo jiù tīngshuō guò gāotiě, zhōngyú kěyǐ zuò shang le.", uz: "Tezyurar poyezd haqida ancha oldin eshitganman, nihoyat unga o'tiraman.", ru: "Давно слышал о высокоскоростных поездах, наконец-то смогу прокатиться.", en: "I've heard of high-speed rail for a long time, finally I can ride it." },
                { speaker: "李文", hanzi: "高铁又快又舒服，你一定会喜欢的。", pinyin: "Gāotiě yòu kuài yòu shūfu, nǐ yídìng huì xǐhuan de.", uz: "Tezyurar poyezd ham tez, ham qulay, senga albatta yoqadi.", ru: "Высокоскоростной поезд быстрый и удобный, тебе обязательно понравится.", en: "High-speed train is fast and comfortable, you will definitely like it." }
                ]
            },
            {
                title: "Muloqot 2 / Диалог 2 / Dialogue 2",
                parts: [
                { speaker: "刘明", hanzi: "过了前面的路口就到高铁站了。", pinyin: "Guòle qiánmiàn de lùkǒu jiù dào gāotiězhàn le.", uz: "Oldindagi chorrahadan o'tsak, tezyurar poyezd vokzaliga yetib kelamiz.", ru: "Проедем перекресток впереди и прибудем на вокзал.", en: "We will arrive at the high-speed train station after passing the intersection ahead." },
                { speaker: "白家月", hanzi: "我看见了。马上就到了，这条路车很多，您小心点儿。", pinyin: "Wǒ kànjiàn le. Mǎshàng jiù dào le, zhè tiáo lù chē hěn duō, nín xiǎoxīn diǎnr.", uz: "Ko'rdim. Hozir yetib boramiz, bu yo'lda mashinalar ko'p, ehtiyot bo'ling.", ru: "Я вижу. Скоро прибудем, на этой дороге много машин, будьте осторожны.", en: "I see it. We will be there soon. There are many cars on this road, be careful." },
                { speaker: "刘明", hanzi: "好，你们还有一个小时，应该不会迟到的。", pinyin: "Hǎo, nǐmen hái yǒu yí ge xiǎoshí, yīnggāi bú huì chídào de.", uz: "Yaxshi, sizlarda yana bir soat vaqt bor, kechikmaysizlar deb o'ylayman.", ru: "Хорошо, у вас есть еще час, вы не должны опоздать.", en: "Okay, you still have an hour, you shouldn't be late." },
                { speaker: "白家月", hanzi: "我发现这条路车多，红绿灯也多。", pinyin: "Wǒ fāxiàn zhè tiáo lù chē duō, hónglǜdēng yě duō.", uz: "Bu yo'lda mashinalar ham, svetoforlar ham ko'p ekanligini payqadim.", ru: "Я заметил, что на этой дороге много машин и светофоров.", en: "I noticed there are many cars and traffic lights on this road." },
                { speaker: "刘明", hanzi: "是啊，这条路我走过一次，后来再也不走了。", pinyin: "Shì a, zhè tiáo lù wǒ zǒuguo yí cì, hòulái zài yě bù zǒu le.", uz: "Ha, men bu yo'ldan bir marta yurganman, keyin umuman yurmadim.", ru: "Да, я ехал по этой дороге один раз, а потом больше не ездил.", en: "Yes, I drove this road once, and never took it again." },
                { speaker: "白家月", hanzi: "那您今天为什么走了这条路？", pinyin: "Nà nín jīntiān wèi shénme zǒu le zhè tiáo lù?", uz: "Unda nima uchun bugun bu yo'ldan yurdingiz?", ru: "Тогда почему вы поехали по этой дороге сегодня?", en: "Then why did you take this road today?" },
                { speaker: "刘明", hanzi: "我一急就走错了。如果没走错，二十分钟以前就到了。", pinyin: "Wǒ yì jí jiù zǒu cuò le. Rúguǒ méi zǒu cuò, èrshí fēnzhōng yǐqián jiù dào le.", uz: "Shoshilib xato yo'ldan yurib ketdim. Agar xato qilmaganimda, 20 daqiqa oldin yetib kelgan bo'lardik.", ru: "Я в спешке поехал не туда. Если бы не ошибся, приехали бы 20 минут назад.", en: "I took the wrong way because I was in a hurry. If I hadn't gone wrong, we would have arrived 20 minutes ago." }
                ]
            },
            {
                title: "Muloqot 3 / Диалог 3 / Dialogue 3",
                parts: [
                { speaker: "白家月", hanzi: "李文，我的耳机没电了，你有充电宝吗？", pinyin: "Lǐ Wén, wǒ de ěrjī méi diàn le, nǐ yǒu chōngdiànbǎo ma?", uz: "Li Ven, quloqchinimning quvvati tugadi, senda quvvat banki bormi?", ru: "Ли Вэнь, мои наушники разрядились. У тебя есть повербанк?", en: "Li Wen, my earphones are out of battery. Do you have a power bank?" },
                { speaker: "李文", hanzi: "有，这些常用的东西我都放在包里了，我给你拿。", pinyin: "Yǒu, zhèxiē chángyòng de dōngxi wǒ dōu fàng zài bāo lǐ le, wǒ gěi nǐ ná.", uz: "Bor, bunday doim ishlatiladigan narsalarni sumkamga solganman, hozir olib beraman.", ru: "Да, все эти часто используемые вещи я положил в сумку, я достану для тебя.", en: "Yes, I put all these commonly used things in my bag. I'll get it for you." },
                { speaker: "白家月", hanzi: "前面的人越来越多。", pinyin: "Qiánmiàn de rén yuè lái yuè duō.", uz: "Oldindagi odamlar tobora ko'payib boryapti.", ru: "Людей впереди становится все больше и больше.", en: "There are more and more people ahead." },
                { speaker: "李文", hanzi: "对，马上就进高铁站了。咱们一起走，别分开。", pinyin: "Duì, mǎshàng jiù jìn gāotiězhàn le. Zánmen yìqǐ zǒu, bié fēnkāi.", uz: "To'g'ri, hozir vokzalga kiramiz. Birga yuramiz, ajralib qolmaylik.", ru: "Верно, скоро зайдем на вокзал. Пойдем вместе, не разделяемся.", en: "Right, we will enter the station soon. Let's walk together, don't separate." },
                { speaker: "白家月", hanzi: "好，你检查一下，高铁票都拿好了吗？", pinyin: "Hǎo, nǐ jiǎnchá yíxià, gāotiě piào dōu ná hǎo le ma?", uz: "Yaxshi, bir tekshirib ko'r, chiptalarni olib qo'ydingmi?", ru: "Хорошо, проверь, билеты на поезд готовы?", en: "Okay, check if you have the tickets ready?" },
                { speaker: "李文", hanzi: "不用拿票，刷护照就能检票进站。", pinyin: "Búyòng ná piào, shuā hùzhào jiù néng jiǎnpiào jìn zhàn.", uz: "Chipta kerak emas, pasportni skanerlab vokzalga kirish mumkin.", ru: "Билеты не нужны, можно пройти, отсканировав паспорт.", en: "No need to take the ticket. We can check in by scanning our passports." },
                { speaker: "白家月", hanzi: "去哪里检票？", pinyin: "Qù nǎlǐ jiǎnpiào?", uz: "Chiptani qayerda tekshiramiz?", ru: "Где проверять билеты?", en: "Where to check the tickets?" },
                { speaker: "李文", hanzi: "检票口在二层，我们一会儿坐电梯上去。", pinyin: "Jiǎnpiàokǒu zài èr céng, wǒmen yíhuìr zuò diàntī shàngqù.", uz: "Chipta tekshirish joyi ikkinchi qavatda, hozir liftda tepaga chiqamiz.", ru: "Выход на посадку на втором этаже, мы скоро поднимемся на лифте.", en: "The ticket gate is on the second floor. We'll take the elevator up in a moment." }
                ]
            },
            {
                title: "Muloqot 4 / Диалог 4 / Dialogue 4",
                parts: [
                { speaker: "白家月", hanzi: "这次放假，我去了北京，还去了上海。", pinyin: "Zhè cì fàngjià, wǒ qù le Běijīng, hái qù le Shànghǎi.", uz: "Bu ta'tilda men Pekinga, shuningdek Shanxayga ham bordim.", ru: "В эти каникулы я поехал в Пекин, а также в Шанхай.", en: "This vacation, I went to Beijing and also to Shanghai." },
                { speaker: "白家月", hanzi: "我是从北京南站坐高铁去的上海。", pinyin: "Wǒ shì cóng Běijīng Nán Zhàn zuò gāotiě qù de Shànghǎi.", uz: "Men Pekin janubiy vokzalidan tezyurar poyezdda Shanxayga bordim.", ru: "Я поехал в Шанхай на высокоскоростном поезде от Южного вокзала Пекина.", en: "I took the high-speed train from Beijing South Railway Station to Shanghai." },
                { speaker: "白家月", hanzi: "我觉得坐在高铁上跟坐在家里的沙发上一样，又安静又舒服。", pinyin: "Wǒ juéde zuò zài gāotiě shang gēn zuò zài jiālǐ de shāfā shang yíyàng, yòu ānjìng yòu shūfu.", uz: "Tezyurar poyezdda o'tirish uydagi divanda o'tirishga o'xshaydi, ham tinch, ham qulay deb o'ylayman.", ru: "Мне кажется, сидеть в высокоскоростном поезде — это как сидеть на диване дома, тихо и удобно.", en: "I feel sitting on the high-speed train is like sitting on the sofa at home, quiet and comfortable." },

                }

                options.sort(() => Math.random() - 0.5);
                return {

        const fillBlanksTest = [

        ];

        // --- COMPONENTS ---
        const Flashcards = () => {
            const [index, setIndex] = useState(0);
            const [flipped, setFlipped] = useState(false);

            const next = () => { setIndex((i) => (i + 1) % vocabulary.length); setFlipped(false); };
            const prev = () => { setIndex((i) => (i - 1 + vocabulary.length) % vocabulary.length); setFlipped(false); };

            const word = vocabulary[index];

            return (
                <div className="flex flex-col items-center justify-center p-6 w-full max-w-2xl mx-auto h-full">

                <div 
                    className={`relative w-full h-80 rounded-2xl cursor-pointer transition-all duration-500 transform-gpu preserve-3d shadow-2xl ${flipped ? 'rotate-y-180' : ''}`}

        };

        const QuizComponent = ({ questions, title }) => {
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selected, setSelected] = useState(null);
            const [answered, setAnswered] = useState(false);

            const q = questions[currentIdx];

            const handleSelect = (opt) => {
                if (answered) return;
                setSelected(opt);
                setAnswered(true);
                if (opt === q.answer) {
                setScore(score + 1);
                }
            };

            const nextQ = () => {
                if (currentIdx < questions.length - 1) {
                setCurrentIdx(currentIdx + 1);
                setSelected(null);
                setAnswered(false);
                } else {
                setShowResults(true);
                }
            };

            const reset = () => {
                setCurrentIdx(0);
                setScore(0);
                setShowResults(false);
                setSelected(null);
                setAnswered(false);
            };

            if (showResults) {
                return (
                <div className="flex flex-col items-center justify-center h-full p-8 text-center animate-fade-in">
                    <Award size={80} className="text-emerald-400 mb-6" />
                    <h2 className="text-4xl font-bold text-white mb-4">Natija: {score} / {questions.length}</h2>
                    <p className="text-slate-300 mb-8 text-lg">
                    {score === questions.length ? "Ajoyib! Siz hamma savollarga to'g'ri javob berdingiz." : "Yaxshi harakat! Yana urinib ko'ring."}
                    </p>
                    <button onClick={reset} className="flex items-center px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-transform hover:scale-105">
                    <RefreshCcw className="mr-3" /> Qayta boshlash
                    </button>
                </div>
                );
            }

            return (
                <div className="w-full max-w-3xl mx-auto p-6 h-full flex flex-col">
                <div className="flex justify-between items-center mb-6">
                    <h2 className="text-2xl font-bold text-white">{title}</h2>
                    <span className="bg-slate-800 text-emerald-400 px-4 py-1.5 rounded-full font-bold border border-slate-700">
                    {currentIdx + 1} / {questions.length}

                </div>

                <div className="bg-slate-800 rounded-2xl p-10 shadow-xl border border-slate-700 flex-grow flex flex-col justify-center relative">

                    {q.q}
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {q.options.map((opt, i) => {
                        let btnClass = "bg-slate-700 text-white border-slate-600 hover:bg-slate-600";

                        if (opt === q.answer) {
                            btnClass = "bg-emerald-600 text-white border-emerald-500 shadow-[0_0_15px_rgba(5,150,105,0.5)]";
                        } else if (opt === selected) {
                            btnClass = "bg-red-500 text-white border-red-400";
                        } else {
                            btnClass = "bg-slate-800 text-slate-500 border-slate-700 opacity-50";
                        }
                        }

                        return (
                        <button
                            key={i}
                            onClick={() => handleSelect(opt)}
                            className={`p-5 rounded-xl text-lg font-medium border-2 transition-all duration-300 ${btnClass} ${!answered ? 'hover:-translate-y-1' : 'cursor-default'}`}
                        >
                            {opt}

                        );

                            </div>

                    <div className="bg-emerald-900/30 p-5 border-b border-emerald-800/50">

                        <div className="mb-6 space-y-2 border-l-4 border-emerald-500 pl-4">

                                <button 
                                onClick={() => playAudio(ex.hanzi)}
                                className="text-slate-400 hover:text-emerald-400 transition-colors"
                                >
                                <Volume2 size={20} />
                                </button>
                            </div>
                            <p className="text-emerald-400">{ex.pinyin}</p>
                            <p className="text-slate-300">{ex.uz}</p>
                            </div>
                        ))}
                        </div>
                    </div>
                    </div>
                ))}
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('flashcards');
            const [vocabTestQs, setVocabTestQs] = useState([]);

            useEffect(() => {
                setVocabTestQs(generateVocabTest());
            }, []);

            const tabs = [
                { id: 'flashcards', icon: <BookOpen size={20} />, label: "Fleshkartalar" },
                { id: 'vocabTest', icon: <CheckSquare size={20} />, label: "Lug'at testi" },
                { id: 'dialogues', icon: <MessageCircle size={20} />, label: "Muloqot" },
                { id: 'grammar', icon: <FileText size={20} />, label: "Grammatika" },
                { id: 'grammarTest', icon: <CheckSquare size={20} />, label: "Grammatika testi" },
                { id: 'fillBlanks', icon: <Edit3 size={20} />, label: "So'zlarni to'ldirish" },
            ];

            return (
                <div className="flex flex-col h-screen bg-slate-900 font-sans text-slate-200">
                <style dangerouslySetInnerHTML={{__html: `
                    .preserve-3d { transform-style: preserve-3d; }
                    .backface-hidden { backface-visibility: hidden; }
                    .rotate-y-180 { transform: rotateY(180deg); }
                    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
                    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
                    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(5, 150, 105, 0.5); border-radius: 4px; }
                    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(5, 150, 105, 0.8); }
                    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
                    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                `}} />

                <header className="bg-slate-800 border-b border-slate-700 py-4 px-6 flex flex-col md:flex-row justify-between items-center shadow-md z-10">
                    <div>
                    <h1 className="text-2xl font-black text-white flex items-center">
                        <span className="bg-emerald-500 text-slate-900 px-2 py-1 rounded mr-3">HSK 3</span>
                        6-dars: 高铁上还可以点外卖
                    </h1>
                    <p className="text-emerald-400 font-medium mt-1">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</p>
                    </div>
                </header>

                <div className="flex flex-1 overflow-hidden">
                    <aside className="w-64 bg-slate-800/80 border-r border-slate-700 flex flex-col backdrop-blur-md hidden md:flex">
                    <nav className="p-4 flex-1 space-y-2">
                        {tabs.map(tab => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`w-full flex items-center px-4 py-3 rounded-xl transition-all duration-200 font-semibold ${
                            activeTab === tab.id 
                                ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-900/20 translate-x-2' 
                                : 'text-slate-400 hover:bg-slate-700 hover:text-white'
                            }`}
                        >
                            <span className={`mr-3 ${activeTab === tab.id ? 'text-emerald-200' : 'text-slate-500'}`}>
                            {tab.icon}
                            </span>
                            {tab.label}
                        </button>
                        ))}
                    </nav>
                    </aside>

                    <div className="md:hidden bg-slate-800 border-b border-slate-700 overflow-x-auto flex flex-shrink-0">
                    {tabs.map(tab => (
                        <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`flex-shrink-0 flex items-center px-4 py-3 font-semibold text-sm transition-colors ${
                            activeTab === tab.id 
                            ? 'border-b-2 border-emerald-500 text-emerald-400 bg-slate-800' 
                            : 'text-slate-400 hover:bg-slate-700'
                        }`}
                        >
                        <span className="mr-2">{tab.icon}</span>
                        {tab.label}
                        </button>
                    ))}
                    </div>

                    <main className="flex-1 p-4 md:p-8 overflow-hidden bg-slate-900">
                    <div className="h-full bg-slate-900 rounded-3xl shadow-inner border border-slate-800/50 relative overflow-hidden">
                        {activeTab === 'flashcards' && <Flashcards />}
                        {activeTab === 'vocabTest' && <QuizComponent questions={vocabTestQs} title="Lug'at testi" />}
                        {activeTab === 'dialogues' && <Dialogues />}
                        {activeTab === 'grammar' && <Grammar />}
                        {activeTab === 'grammarTest' && <QuizComponent questions={grammarTest} title="Grammatika testi" />}
                        {activeTab === 'fillBlanks' && <QuizComponent questions={fillBlanksTest} title="So'zlarni to'ldirish" />}
                    </div>
                    </main>
                </div>

                <footer className="bg-slate-900 border-t border-slate-800 py-3 text-center text-sm text-slate-500">
                    <p>HSK 3 NEW3.0 - Lesson 6 &copy; 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
